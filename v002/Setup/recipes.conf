# jac313 provision recipes — per-platform install commands for build prerequisites.
#
# Data-driven, like compilers.conf: to support a new OS, add a family line — no code
# change. The generated Setup.sh is REVIEWED and run by hand (it modifies the system
# and usually needs sudo). Readiness stays earned by sensing: after running Setup.sh
# you re-run sensing, which refreshes FileCheckList.txt.
#
# Syntax: <component>.<field> = value   (# comments / blank lines ignored)
#   desc       human description, shown as a comment in Setup.sh
#   for        toolchain label this provides — include when that REQUIRED toolchain is
#              missing per sensing (FileCheckList readiness). Omit for standalone tools.
#   check      shell test; exit 0 = already satisfied. Include the recipe when it FAILS.
#   <family>   install command for that OS family (rhel | linuxmint | fedora | <ID>).
#
# Family tokens match FileCheckList's sensed os_family.

# --- compiler toolchains (tied to compilers.conf labels via `for`) ---

gcc15.desc      = GCC 15 toolchain
gcc15.for       = gcc15
gcc15.rhel      = sudo dnf install -y gcc-toolset-15
gcc15.fedora    = sudo dnf install -y gcc gcc-c++
gcc15.linuxmint = sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test && sudo apt-get update && sudo apt-get install -y g++-15

gcc16.desc      = GCC 16 toolchain (Fedora 44+ system gcc)
gcc16.for       = gcc16
gcc16.rhel      = sudo dnf install -y gcc-toolset-16
gcc16.fedora    = sudo dnf install -y gcc gcc-c++
gcc16.linuxmint = sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test && sudo apt-get update && sudo apt-get install -y g++-16

clang.desc      = Clang 20+ with module scan-deps (clang-scan-deps)
clang.for       = clang
clang.rhel      = sudo dnf install -y clang clang-tools-extra
clang.fedora    = sudo dnf install -y clang clang-tools-extra
clang.linuxmint = sudo apt-get install -y clang-20 clang-tools-20

# --- standalone tools (gated by `check`) ---

# REQUIRED build dependency: Qlite links libsqlite3, so the dev headers must be present
# BEFORE the build. Checked in bootstrap's baseline (bootstrap.sh) so Setup.sh provisions
# it pre-build — without it `find_package(SQLite3)` fails on a fresh clone.
sqlite.desc      = SQLite3 dev libraries (Qlite links libsqlite3)
sqlite.check     = [ -e /usr/include/sqlite3.h ]
sqlite.rhel      = sudo dnf install -y sqlite-devel
sqlite.fedora    = sudo dnf install -y sqlite-devel
sqlite.linuxmint = sudo apt-get install -y libsqlite3-dev

ninja.desc      = Ninja >= 1.11 (required for C++23 module builds)
ninja.check     = v=$(ninja --version 2>/dev/null); [ -n "$v" ] && [ "$(printf '1.11\n%s\n' "$v" | sort -V | head -n1)" = 1.11 ]
ninja.rhel      = sudo dnf install -y python3-pip && python3 -m pip install --user ninja
ninja.fedora    = sudo dnf install -y python3-pip && python3 -m pip install --user ninja
ninja.linuxmint = sudo apt-get install -y ninja-build

# Baseline is CMake >= 3.26 (distro packages below). The optional `import std` pilot
# (-DJAC313_QLITE_IMPORT_STD=ON) wants CMake >= 3.30; bootstrap.sh offers a no-sudo
# ~/.local install of the pinned version for that — not provisioned via these recipes.
cmake.desc      = CMake >= 3.26 (import std pilot wants >= 3.30; bootstrap offers a no-sudo install)
cmake.check     = command -v cmake >/dev/null 2>&1
cmake.rhel      = sudo dnf install -y cmake
cmake.fedora    = sudo dnf install -y cmake
cmake.linuxmint = sudo apt-get install -y cmake

# REQUIRED prerequisite. memcheck + helgrind + DRD all ship INSIDE the one valgrind package,
# so this single install covers the whole `matrix verify` / `verify-lite` gate. Readiness is
# NOT READY without it (valgrind.required = true -> part of the readiness gate, earned by check).
# The `check` requires BOTH the binary AND the dev header: the annotated verify tree
# (-DJAC313_STORE_HELGRIND_ANNOTATE=ON) #includes <valgrind/helgrind.h>, which on RHEL/Fedora
# ships in the SEPARATE valgrind-devel package (Debian bundles headers in `valgrind`).
valgrind.desc      = Valgrind + dev headers — memcheck + helgrind + DRD (the matrix verify gate)
valgrind.required  = true
valgrind.check     = command -v valgrind >/dev/null 2>&1 && [ -e /usr/include/valgrind/valgrind.h ]
valgrind.rhel      = sudo dnf install -y valgrind valgrind-devel
valgrind.fedora    = sudo dnf install -y valgrind valgrind-devel
valgrind.linuxmint = sudo apt-get install -y valgrind

# --- BUILD-HOST-ONLY: static C/C++ runtime, to (re)build the committed jac313_setup ---
# The committed Setup/jac313_setup provisioner is linked -static so one binary runs across
# the fleet's distros/glibc versions. Building it needs the static runtime archives
# (glibc-static + libstdc++-static); on RHEL those live in the CodeReady Builder (CRB) repo,
# enabled here first. This recipe has NO `check`/`for` ON PURPOSE — it is therefore INERT in
# the baseline + readiness gates and is NEVER installed on a normal clone host. It is
# provisioned only on demand by Setup/build_setup_exe.sh, when a -static link actually fails.
static_runtime.desc      = Static C/C++ runtime (glibc-static + libstdc++-static) — only to rebuild jac313_setup
static_runtime.rhel      = sudo subscription-manager repos --enable codeready-builder-for-rhel-$(rpm -E %rhel)-x86_64-rpms && sudo dnf install -y glibc-static libstdc++-static
static_runtime.fedora    = sudo dnf install -y glibc-static libstdc++-static
static_runtime.linuxmint = sudo apt-get install -y libc6-dev
