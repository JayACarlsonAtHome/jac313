# jac313 compiler registry — data-driven, activation-aware toolchain table.
#
# Syntax:  <label>.<field> = value     (# comments, blank lines ignored; keys
#          are case-insensitive; one logical toolchain per <label>).
#
# Fields:
#   kind         gcc | clang
#   version      --version MAJOR to match (terminology-independent: a bare `g++`
#                reporting this major satisfies the toolchain)
#   min_version  if set, accept MAJOR >= this (else exact match on `version`)
#   build_dir    out-of-source build tree for this toolchain
#   flag         CLI selector (--gcc15 / --clang)
#   cc_names     compiler invocation names tried in order (whitespace/comma list)
#   activations  command templates tried in order; {CMD} is replaced with the probe
#                command. Each is run via /bin/sh -c, so shell syntax is allowed.
#                Split on '|'. The FIRST (activation x cc_name) whose `cc --version`
#                reports the right major wins.
#   scan_deps    (clang only) clang-scan-deps names to try for module builds
#   required_on  OS families where this toolchain is REQUIRED for a READY verdict
#                (FileCheckList.txt). Family tokens: rhel | linuxmint | fedora | <ID>.
#                Omit = optional everywhere (informational only).
#
# How activation generalizes: every mechanism (plain PATH binary, RHEL 10
# `gcc-toolset-NN-env`, RHEL 9 `scl enable`, a sourced enable-script, a future
# Fedora `module load`, Nix, conda, ...) just produces an environment in which the
# compiler is reachable. The tool captures that environment and applies it to every
# child process (configure, build, ctest, and each matrix test binary). To support a
# new platform, add an activation line here — no code change.
#
# A machine-local override may live at <repo>/compilers.local.conf (gitignored).

gcc15.kind        = gcc
gcc15.version     = 15
gcc15.build_dir   = build-gcc15
gcc15.flag        = --gcc15
gcc15.cc_names    = g++-15 g++15 g++
# RHEL-family via gcc-toolset-15, Linux Mint via the ubuntu-toolchain-r PPA.
# Fedora is NOT here: Fedora 44+ ships gcc 16 as its system compiler (see gcc16).
gcc15.required_on = rhel linuxmint
gcc15.activations = {CMD} | gcc-toolset-15-env {CMD} | scl enable gcc-toolset-15 -- {CMD} | bash -c 'source /opt/rh/gcc-toolset-15/enable && {CMD}'

# Fedora 44+ ships gcc 16 as the system compiler. jac313 compiles clean with it;
# this entry runs + labels it accurately as gcc16 (never mislabeled gcc15).
gcc16.kind        = gcc
gcc16.version     = 16
gcc16.build_dir   = build-gcc16
gcc16.flag        = --gcc16
gcc16.cc_names    = g++-16 g++16 g++
gcc16.required_on = fedora
gcc16.activations = {CMD} | gcc-toolset-16-env {CMD} | scl enable gcc-toolset-16 -- {CMD}

# Label stays "clang" (matches committed results paths); build_dir is build-clang20.
clang.kind        = clang
clang.version     = 20
clang.min_version = 20
clang.build_dir   = build-clang20
clang.flag        = --clang
clang.cc_names    = clang++-20 clang++20 clang++
# Required on all supported platforms.
clang.required_on = rhel fedora linuxmint
clang.activations = {CMD}
clang.scan_deps   = clang-scan-deps-20 clang-scan-deps
